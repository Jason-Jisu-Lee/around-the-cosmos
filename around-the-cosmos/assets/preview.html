<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Preview — Around the Cosmos</title>
<style>
    :root { --bg:#f4f0e8; --ink:#1a1a1a; --border:#d9d2c4; }
    body { background:var(--bg); color:var(--ink); font:14px/1.5 Georgia, serif; margin:0; padding:32px; }
    h1 { font-size:20px; font-weight:normal; letter-spacing:.04em; margin:0 0 4px; }
    p.lead { color:#7a7468; margin:0 0 28px; }
    .grid { display:flex; flex-wrap:wrap; gap:20px; }
    .card { background:#fbf9f4; border:1px solid var(--border); border-radius:6px; padding:16px; width:240px; }
    .name { font-size:15px; margin-bottom:2px; }
    .meta { font-size:12px; color:#8a8478; margin-bottom:12px; }
    .row { display:flex; align-items:center; gap:18px; }
    .swatch { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .swatch span { font-size:11px; color:#8a8478; }
    /* nearest-neighbour so the zoom shows real pixels */
    .px { image-rendering:pixelated; image-rendering:crisp-edges; }
    .dark { background:#22262e; border-radius:4px; padding:4px; }
    .chosen { outline:2px solid #c9a24a; outline-offset:3px; }
</style>
</head>
<body>
    <h1>Cursor assets</h1>
    <p class="lead">Generated by <code>cursors/generate.js</code>. Tip (top-left, gold pixel) = the click hotspot at 3,3.
       Gold border = the one wired into the game.</p>
    <div class="grid" id="grid"></div>
<script>
    // Each asset: file, label, whether it's the in-game cursor.
    const ASSETS = [
        { f:'cursors/needle.png', name:'Needle', chosen:true, note:'in-game cursor (48px, hotspot 4,4)' },
    ];
    const grid = document.getElementById('grid');
    for (const a of ASSETS) {
        const card = document.createElement('div');
        card.className = 'card' + (a.chosen ? ' chosen' : '');
        card.innerHTML = `
            <div class="name">${a.name}</div>
            <div class="meta">${a.note}</div>
            <div class="row">
                <div class="swatch"><img src="${a.f}" width="32" height="32"><span>1×</span></div>
                <div class="swatch"><img class="px" src="${a.f}" width="128" height="128"><span>4×</span></div>
                <div class="swatch dark"><img class="px" src="${a.f}" width="64" height="64"><span style="color:#bcc2c8">on dark</span></div>
            </div>`;
        grid.appendChild(card);
    }
</script>
</body>
</html>
