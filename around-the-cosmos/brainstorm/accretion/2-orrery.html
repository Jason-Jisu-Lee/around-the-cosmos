<!DOCTYPE html><html><head><meta charset="UTF-8"><title>2 · Orrery</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 50%,#161022,#06040c 72%);color:#ece6f6;font-family:'Nunito',sans-serif}
  .dial{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:660px;height:660px}
  .ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:1px solid #251c3e;border-radius:50%}
  .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 50% 42%,#1a1230,#0a0716);
    box-shadow:0 0 56px 14px rgba(155,125,230,.30),inset 0 0 24px rgba(130,100,200,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .core .m{font-size:27px;font-weight:800;color:#f1ecff}.core .k{font-size:9px;letter-spacing:.34em;color:#9085b8;margin-top:2px;font-weight:700}
  .node{position:absolute;transform:translate(-50%,-50%);width:92px;text-align:center;background:rgba(34,26,54,.72);border:1px solid #3a2f5e;border-radius:13px;padding:6px 5px}
  .node.lock{opacity:.42}.node .n{font-size:11.5px;font-weight:700;color:var(--col);white-space:nowrap}.node .c{font-size:11px;color:#c3b1e8;font-weight:800}
  .secl{position:absolute;transform:translate(-50%,-50%);font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#a99fd6}
  .accrete{position:absolute;right:30px;bottom:24px;background:rgba(155,125,230,.12);border:1px solid #4a4072;color:#ece6f6;padding:12px 28px;border-radius:24px;font:800 14px Nunito;cursor:pointer}
</style></head><body>
  <div class="dial" id="d">
    <div class="ring" style="width:200px;height:200px"></div><div class="ring" style="width:330px;height:330px"></div>
    <div class="ring" style="width:460px;height:460px"></div><div class="ring" style="width:600px;height:600px"></div>
    <div class="core"><div class="m">✶ 12</div><div class="k">MASS</div></div>
  </div>
  <button class="accrete">Accrete</button>
<script>
  const CC=['#b39cf0','#79d4cd','#e6b574','#9aa9f0'], CN=['Lacuna','Orbiters','Phenomena','Continuum'];
  const R=[118,175,232,300,330], A0=[-45,45,135,225]; const d=document.getElementById('d'); let k=1,html='';
  for(let s=0;s<4;s++){
    const baseA=A0[s];
    for(let t=0;t<5;t++){
      const a=(baseA+(t-2)*7)*Math.PI/180, r=R[t]+ (t===4?-30:0);
      const x=330+r*Math.cos(a), y=330+r*Math.sin(a);
      html+=`<div class="node ${t>1?'lock':''}" style="left:${x}px;top:${y}px;--col:${CC[s]}"><div class="n">Dummy #${k++}</div><div class="c">✶${t+1}</div></div>`;
    }
    const la=baseA*Math.PI/180, lr=300;
    html+=`<div class="secl" style="left:${330+lr*Math.cos(la)}px;top:${330+lr*Math.sin(la)}px;color:${CC[s]}">${CN[s]}</div>`;
  }
  d.insertAdjacentHTML('beforeend',html);
</script></body></html>
