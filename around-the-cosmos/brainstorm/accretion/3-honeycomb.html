<!DOCTYPE html><html><head><meta charset="UTF-8"><title>3 · Honeycomb</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 30%,#101a18,#060c0b 74%);color:#e6f0ec;font-family:'Nunito',sans-serif}
  .top{display:flex;align-items:center;gap:16px;padding:22px 34px}
  .badge{width:78px;height:78px;border-radius:50%;background:radial-gradient(circle at 50% 42%,#0c1816,#06100e);box-shadow:0 0 36px 8px rgba(90,200,170,.24);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex-shrink:0}
  .badge .m{font-size:20px;font-weight:800;color:#e9fff8}.badge .k{font-size:8px;letter-spacing:.3em;color:#6fa49b;font-weight:700}
  .legend{display:flex;gap:18px;font-size:12px;font-weight:700}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
  .comb{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);display:grid;grid-template-columns:repeat(6,108px);gap:8px 4px}
  .col{display:flex;flex-direction:column;gap:8px}.col.odd{margin-top:58px}
  .hex{width:108px;height:118px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:var(--c);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .hex.lock{opacity:.34}.hex .n{font-size:12.5px;font-weight:800;color:#0c1614}.hex .c{font-size:12px;font-weight:800;color:rgba(8,18,16,.7)}
  .accrete{position:absolute;right:30px;bottom:22px;background:linear-gradient(#1f8473,#15604f);border:none;color:#eafff8;padding:13px 30px;border-radius:999px;font:800 14px Nunito;cursor:pointer}
</style></head><body>
  <div class="top">
    <div class="badge"><div class="m">✶12</div><div class="k">MASS</div></div>
    <div class="legend" id="lg"></div>
  </div>
  <div class="comb" id="c"></div>
  <button class="accrete">Accrete</button>
<script>
  const CC=['#b39cf0','#79d4cd','#e6b574','#9aa9f0'], CN=['Lacuna','Orbiters','Phenomena','Continuum'];
  // 6 columns, ~3-4 hexes each = 20; category by region
  const cols=[[0,0,1],[0,1,1],[1,1,2],[2,1,2],[2,3,3],[2,3,3]]; // category index per hex per column
  let k=1,html='';
  cols.forEach((cats,ci)=>{ html+=`<div class="col ${ci%2?'odd':''}">`+cats.map((cat,ri)=>`<div class="hex ${k>9?'lock':''}" style="--c:${CC[cat]}"><div class="n">Dummy #${k++}</div><div class="c">✶${1+(ri%4)}</div></div>`).join('')+`</div>`; });
  document.getElementById('c').innerHTML=html;
  document.getElementById('lg').innerHTML=CN.map((c,i)=>`<span><i style="background:${CC[i]}"></i>${c}</span>`).join('');
</script></body></html>
