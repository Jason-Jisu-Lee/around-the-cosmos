<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Accretion — 5 paradigms</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;background:#0c0d12;color:#cdd2dc;font-family:'Nunito',sans-serif}
  h1{font-weight:800;padding:24px 28px 2px;font-size:22px}
  p.l{margin:0 28px 18px;color:#828a98;font-size:13px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding:0 28px 40px;max-width:1320px}
  .tile{background:#08090d;border:1px solid #242833;border-radius:10px;overflow:hidden}
  .cap{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;font-size:15px;font-weight:700}
  .cap a{color:#9fb0ff;text-decoration:none;font-size:12px;font-weight:600}
  .frame{position:relative;height:330px;border-top:1px solid #242833;overflow:hidden}
  .frame iframe{position:absolute;top:0;left:0;width:1300px;height:780px;border:0;transform:scale(.55);transform-origin:top left;pointer-events:none}
</style></head><body>
  <h1>Accretion — 5 upgrade-tree paradigms</h1>
  <p class="l">Genuinely different structures (not just relayouts). Branching, parallel availability — not a forced single chain. 4 categories (Orbiters · Lacuna · Phenomena · Continuum), ~20 dummy upgrades, Nunito throughout.</p>
  <div class="grid" id="g"></div>
<script>
  const M=[
    ['1 · Tech Tree','DAG flowchart — branches merge & split, like a Civ tech tree','1-techtree.html'],
    ['2 · Orrery','radial — Mass core center, tiers spiral outward by sector','2-orrery.html'],
    ['3 · Honeycomb','hex grid clustered into colored category regions','3-honeycomb.html'],
    ['4 · Constellation','free star-map — 4 constellations linked to the core','4-constellation.html'],
    ['5 · Store','no tree — a clean shop grid, buy in any order','5-shop.html'],
  ];
  document.getElementById('g').innerHTML=M.map(([t,d,f])=>`<div class="tile"><div class="cap"><span>${t} — <span style="color:#828a98;font-weight:400">${d}</span></span><a href="${f}" target="_blank">open ↗</a></div><div class="frame"><iframe src="${f}"></iframe></div></div>`).join('');
</script></body></html>
