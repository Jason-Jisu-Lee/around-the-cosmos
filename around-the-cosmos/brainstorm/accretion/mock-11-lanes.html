<!DOCTYPE html><html><head><meta charset="UTF-8"><title>11 · Observatory Shelves</title>
<style>
  html,body{margin:0;min-height:100%;background:#0e0c0a;color:#ece1cd;font-family:Georgia,serif}
  .hud{display:flex;justify-content:space-between;align-items:baseline;padding:20px 30px}
  .hud .k{font-size:11px;letter-spacing:.4em;color:#9a8a66}.hud .m{font-size:28px;color:#f3e4bf}
  .lane{display:flex;align-items:center;gap:20px;padding:16px 30px;border-top:1px solid #221c12}
  .lane .tag{width:104px;flex-shrink:0;font-size:12px;letter-spacing:.28em;color:#c2a464;text-transform:uppercase}
  .cards{display:flex;gap:12px;flex-wrap:wrap}
  .card{background:#1a150d;border:1px solid #322817;border-radius:6px;padding:11px 15px;min-width:128px}
  .card .nm{font-size:14px}.card .ct{font-size:12px;color:#d8b56a;margin-top:3px}
  .accrete{margin:22px 30px 34px;background:none;border:1px solid #5c4a2a;color:#ece1cd;padding:12px 30px;letter-spacing:.25em;font:14px Georgia;cursor:pointer}
</style></head><body>
  <div class="hud"><div class="k">A C C R E T I O N · S H E L V E S</div><div class="m">✶ 12 Mass</div></div>
  <div id="x"></div>
  <button class="accrete">A C C R E T E</button>
<script>
  const CATS=[['Lacuna',[['Swell the Lacuna',5],['Deeper Pull',3]]],['Orbiters',[['Dwarf Planet',4],['Persistent Dust',1],['Swift Orbits',2]]],['Comet',[['Comet Charm',2],['More Comets',3]]],['Economy',[['Star Touch ×2',2],['Resonant Memory',3],['Auto-Harvest',3]]]];
  document.getElementById('x').innerHTML=CATS.map(([c,us])=>`<div class="lane"><div class="tag">${c}</div><div class="cards">${us.map(([n,p])=>`<div class="card"><div class="nm">${n}</div><div class="ct">✶ ${p}</div></div>`).join('')}</div></div>`).join('');
</script>
</body></html>
