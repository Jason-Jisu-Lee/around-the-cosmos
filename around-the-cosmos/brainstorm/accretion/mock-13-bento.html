<!DOCTYPE html><html><head><meta charset="UTF-8"><title>13 · Bento Dashboard</title>
<style>
  html,body{margin:0;height:100%;background:#0c0e12;color:#dde2ec;font-family:'Segoe UI',sans-serif}
  .bar{display:flex;justify-content:space-between;align-items:center;padding:18px 28px}
  .bar .k{font-size:12px;letter-spacing:.3em;color:#646e82}.bar .m{font-size:24px;color:#aebcff;font-weight:600}
  .bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:148px;gap:14px;padding:0 28px 24px;max-width:1100px}
  .panel{background:#14171f;border:1px solid #232936;border-radius:12px;padding:16px 18px;overflow:hidden}
  .panel.wide{grid-column:span 2}.panel.tall{grid-row:span 2}
  .panel h2{font-size:11px;letter-spacing:.25em;color:#7e8aa2;text-transform:uppercase;margin:0 0 12px;font-weight:600}
  .u{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;border-bottom:1px solid #1c212c}
  .u .ct{color:#9fb0ff}
  .accrete{display:block;margin:6px 28px 26px;background:linear-gradient(#3a46a8,#283180);border:none;color:#fff;padding:13px;border-radius:10px;font:15px 'Segoe UI';letter-spacing:.1em;cursor:pointer;width:200px}
</style></head><body>
  <div class="bar"><div class="k">ACCRETION · MASS</div><div class="m">✶ 12</div></div>
  <div class="bento">
    <div class="panel tall"><h2>Lacuna</h2>
      <div class="u"><span>Swell the Lacuna</span><span class="ct">✶5</span></div>
      <div class="u"><span>Deeper Pull</span><span class="ct">✶3</span></div>
      <div class="u"><span>Event Horizon</span><span class="ct">✶5</span></div></div>
    <div class="panel wide"><h2>Orbiters</h2>
      <div class="u"><span>Dwarf Planet</span><span class="ct">✶4</span></div>
      <div class="u"><span>Persistent Dust</span><span class="ct">✶1</span></div>
      <div class="u"><span>Swift Orbits</span><span class="ct">✶2</span></div></div>
    <div class="panel"><h2>Comet</h2>
      <div class="u"><span>Comet Charm</span><span class="ct">✶2</span></div>
      <div class="u"><span>More Comets</span><span class="ct">✶3</span></div></div>
    <div class="panel wide"><h2>Economy</h2>
      <div class="u"><span>Star Touch ×2</span><span class="ct">✶2</span></div>
      <div class="u"><span>Resonant Memory</span><span class="ct">✶3</span></div>
      <div class="u"><span>Auto-Harvest</span><span class="ct">✶3</span></div></div>
  </div>
  <button class="accrete">ACCRETE ↩</button>
</body></html>
