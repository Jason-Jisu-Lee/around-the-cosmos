<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Stars · Chart Markers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_theme.css">
</head><body>
  <canvas id="stars"></canvas>
  <div class="top"><div class="badge"><div class="ring">12</div><div class="lbl">Mass<b>twelve</b></div></div><div class="title">Accretion</div></div>
  <div class="clusters" id="c"></div>
  <button class="accrete">Accrete</button>
<script>
  // Variation 3: cartographic markers - hollow ink rings (varying size) + a few solid dots.
  const cv=document.getElementById('stars'),x=cv.getContext('2d');let S=[];
  function gen(){cv.width=innerWidth;cv.height=innerHeight;S=[];for(let i=0;i<80;i++){
    const ring=Math.random()<.62;S.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:ring?Math.random()*2.6+1.4:Math.random()*1.3+.8,ring,p:Math.random()*6.28});}}
  function draw(t){x.clearRect(0,0,cv.width,cv.height);for(const s of S){const a=.4+.25*Math.sin(t/780+s.p);x.globalAlpha=a;
    x.beginPath();x.arc(s.x,s.y,s.r,0,7);
    if(s.ring){x.lineWidth=.8;x.strokeStyle='#5a5038';x.stroke();}
    else{x.fillStyle='#5a5038';x.fill();}}
    requestAnimationFrame(draw);}
  addEventListener('resize',gen);gen();requestAnimationFrame(draw);
</script>
<script src="_bloom.js"></script>
</body></html>
