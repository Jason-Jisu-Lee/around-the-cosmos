<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the Cosmos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=256">
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="header-right">
                <button id="pause-btn" title="Pause">&#10074;&#10074;</button>
                <button id="mute-btn">&#9834;</button>
                <div id="settings-wrap">
                    <button id="settings-btn">&#9881;</button>
                    <div id="settings-panel">
                        <div class="settings-label">SOUND</div>
                        <div class="settings-row">
                            <span class="settings-name">Music</span>
                            <input type="range" id="vol-music" min="0" max="100" value="75">
                            <span class="vol-val" id="vol-music-val">75%</span>
                        </div>
                        <div class="settings-row">
                            <span class="settings-name">Effects</span>
                            <input type="range" id="vol-sfx" min="0" max="100" value="75">
                            <span class="vol-val" id="vol-sfx-val">75%</span>
                        </div>
                        <div class="settings-label" style="margin-top:12px">MENU</div>
                        <button id="front-page-btn">FRONT PAGE</button>
                    </div>
                </div>
                <button id="reset-btn">RESET</button>
            </div>
        </header>
        <main id="main">
            <!-- Left column: stardust HUD + MAIN upgrades at top; observatory floats bottom-left -->
            <aside id="left-col">
                <div id="dust-hud">
                    <div id="dust-display"><span id="dust-icon">✦</span> <span id="dust-amount">0</span></div>
                </div>
                <div id="main-upgrades"></div>
            </aside>

            <!-- Center: sky canvas -->
            <section id="sky-section">
                <canvas id="sky"></canvas>
                <div id="cosmo-tip"></div>
                <div id="cosmo-card"></div>
            </section>

            <!-- Right column: orbiter upgrades -->
            <aside id="right-col">
                <div id="upgrades-list"></div>
                <div id="upg-controls">
                    <label id="show-completed-wrap">
                        <input type="checkbox" id="show-completed"> Hide completed
                    </label>
                </div>
            </aside>
        </main>
    </div>

    <!-- Vortex event overlay - full-window, below the comet layer; the rare spiral event is drawn here -->
    <canvas id="vortex-layer"></canvas>

    <!-- Comet overlay - full-window, above the panels (pointer-events:none); the comet is drawn here so it can fly over the side panels and stay clickable -->
    <canvas id="comet-layer"></canvas>

    <!-- Observatory - draggable stats panel, default bottom-left; floats over the left column -->
    <div id="observatory"><div id="stats-list"></div></div>

    <!-- Accretion + Mass Upgrades are rendered as special cards at the bottom of the MAIN upgrades (panels.js) -->

    <!-- Accretion (prestige) screen - overlays the live page; opens from the Accretion card -->
    <div id="accretion-screen">
        <canvas id="acc-stars"></canvas>
        <button id="acc-undo" class="acc-undo">↶ Undo</button>
        <button id="acc-return" class="acc-return">Return to the Cosmos</button>
        <div id="acc-mass" class="acc-masshdr"></div>
        <div id="acc-tabs" class="acc-tabs"></div>
        <div class="acc-stage">
            <div id="acc-tree" class="acc-tree"></div>
        </div>
    </div>

    <!-- Pause overlay - dims the screen and shows PAUSED while the game is frozen -->
    <div id="pause-overlay"><span>PAUSED</span></div>

    <!-- Absorption animation overlay (Implosion &amp; Rebirth); shown only during the Accretion sequence -->
    <canvas id="accretion-fx"></canvas>

    <!-- Accretion confirm modal - top-level so it shows over the live game when the button is pressed -->
    <div id="acc-confirm" class="acc-confirm">
        <div class="acc-confirm-stack">
            <label id="acc-skip-outer" class="acc-skip"><input type="checkbox" id="acc-skip-anim"> Skip animation</label>
            <div class="acc-confirm-box">
                <div id="acc-confirm-body" class="acc-confirm-body"></div>
                <div class="acc-confirm-actions">
                    <button id="acc-confirm-go" class="acc-btn-go"><canvas class="acc-go-fx"></canvas><span class="acc-go-label">Collapse</span></button>
                    <button id="acc-confirm-cancel" class="acc-btn-ghost">Not yet</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mass-page hover detail popup (the "math"); kept off the minimal cards -->
    <div id="acc-pop"></div>

    <!-- Leave-confirm modal - shown when leaving the post-Accretion Mass page (where Mass can be spent) -->
    <div id="acc-leave-confirm" class="acc-confirm">
        <div class="acc-confirm-box">
            <div class="acc-confirm-title">Return to Cosmos?</div>
            <div class="acc-confirm-body">
                <p>You cannot spend Mass once you go back to the Cosmos.</p>
            </div>
            <div class="acc-confirm-actions">
                <button id="acc-leave-go" class="acc-btn-go">Yes</button>
                <button id="acc-leave-stay" class="acc-btn-ghost">Not Yet</button>
            </div>
        </div>
    </div>

    <!-- End-of-demo modal - shown when the player clicks the "Finish Demo" spine gate -->
    <div id="demo-finish" class="acc-confirm">
        <div class="acc-confirm-box">
            <div class="acc-confirm-title">Thank you for playing</div>
            <div class="acc-confirm-body">
                <p>The rest of the content will be released on Steam under the same title.</p>
            </div>
            <div class="acc-confirm-actions">
                <button id="demo-finish-go" class="acc-btn-go">Finish</button>
                <button id="demo-finish-stay" class="acc-btn-ghost">Stay in the Cosmos</button>
            </div>
        </div>
    </div>

    <!-- Shared upgrade description popup (positioned to the left of the hovered card) -->
    <div id="upg-pop"></div>

    <!-- Tutorial overlay (Minimal Frost) - dims everything, spotlights the thing being explained -->
    <div id="tutorial"></div>

    <!-- Front page (The Slow Zoom): shown on load + via the settings FRONT PAGE button -->
    <div id="frontpage">
        <canvas id="front-stars"></canvas>
        <div class="front-credit">By 2ndIntelligentWorld</div>
        <div class="front-mid">
            <h1 class="front-title">AROUND THE COSMOS</h1>
            <button id="front-start">START</button>
        </div>
    </div>

    <!-- Core -->
    <script src="config.js?v=256"></script>
    <script src="state.js?v=256"></script>

    <!-- Sound (engine + effects + music) -->
    <script src="sound/core.js?v=256"></script>
    <script src="sound/effects/sfx.js?v=256"></script>
    <script src="sound/music/tracks.js?v=256"></script>
    <script src="sound/sound.js?v=256"></script>

    <!-- Orbiters (one component per type) -->
    <script src="orbiters/registry.js?v=256"></script>
    <script src="orbiters/dust.js?v=256"></script>
    <script src="orbiters/asteroid.js?v=256"></script>
    <script src="orbiters/moon.js?v=256"></script>
    <script src="orbiters/dwarf.js?v=256"></script>

    <!-- Upgrades -->
    <script src="upgrades/upgrades.js?v=256"></script>
    <script src="upgrades/mass.js?v=256"></script>

    <!-- Render + simulation -->
    <script src="assets/click-effects/effects.js?v=256"></script>
    <script src="render.js?v=256"></script>
    <script src="stars.js?v=256"></script>
    <script src="comet/comet.js?v=256"></script>
    <script src="event/vortex.js?v=256"></script>
    <script src="simulation.js?v=256"></script>

    <!-- UI -->
    <script src="ui/panels.js?v=256"></script>
    <script src="ui/observatory.js?v=256"></script>
    <script src="ui/hud.js?v=256"></script>
    <script src="ui/cosmo.js?v=256"></script>
    <script src="ui/mass-tree.js?v=256"></script>
    <script src="ui/accretion-fx.js?v=256"></script>
    <script src="ui/accretion.js?v=256"></script>
    <script src="ui/tutorial.js?v=256"></script>
    <script src="ui/frontpage.js?v=256"></script>

    <!-- App -->
    <script src="settings.js?v=256"></script>
    <script src="debug.js?v=256"></script>
    <script src="main.js?v=256"></script>
</body>
</html>
