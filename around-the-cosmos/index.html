<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the Cosmos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=110">
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="logo">AROUND THE COSMOS</div>
            <div id="header-right">
                <button id="mute-btn">&#9834;</button>
                <div id="settings-wrap">
                    <button id="settings-btn">&#9881;</button>
                    <div id="settings-panel">
                        <div class="settings-label">SOUND</div>
                        <div class="settings-row">
                            <span class="settings-name">Music</span>
                            <input type="range" id="vol-music" min="0" max="100" value="75">
                            <span class="vol-val" id="vol-music-val">75%</span>
                        </div>
                        <div class="settings-row">
                            <span class="settings-name">Effects</span>
                            <input type="range" id="vol-sfx" min="0" max="100" value="75">
                            <span class="vol-val" id="vol-sfx-val">75%</span>
                        </div>
                        <div class="settings-label" style="margin-top:12px">MUSIC TRACK</div>
                        <div id="track-row">
                            <button class="track-btn active" data-track="0">Celestial</button>
                            <button class="track-btn" data-track="1">Drift</button>
                            <button class="track-btn" data-track="2">Wane</button>
                        </div>
                    </div>
                </div>
                <button id="reset-btn">RESET</button>
            </div>
        </header>
        <main id="main">
            <!-- Left column (reserved) -->
            <aside id="left-col"></aside>

            <!-- Center: sky canvas -->
            <section id="sky-section">
                <canvas id="sky"></canvas>
                <div id="cosmo-tip"></div>
                <div id="cosmo-card"></div>
            </section>

            <!-- Right column: upgrades -->
            <aside id="right-col">
                <div id="dust-hud">
                    <div id="dust-display"><span id="dust-icon">✦</span> <span id="dust-amount">0</span></div>
                </div>
                <div id="upgrades-list"></div>
                <div id="upg-controls">
                    <label id="show-completed-wrap">
                        <input type="checkbox" id="show-completed" checked> Hide completed
                    </label>
                </div>
            </aside>
        </main>
    </div>

    <!-- Draggable observatory panel — default top-left -->
    <div id="observatory">
        <div id="stats-list"></div>
    </div>

    <div id="accretion-btn">Accretion</div>

    <!-- Accretion (prestige) screen — overlays the live page; opens from #accretion-btn -->
    <div id="accretion-screen">
        <canvas id="acc-stars"></canvas>
        <div class="acc-eyebrow">Accretion</div>
        <button id="acc-return" class="acc-return">Return to the Cosmos</button>
        <div id="acc-mass" class="acc-masshdr"></div>
        <div id="acc-tabs" class="acc-tabs"></div>
        <div class="acc-stage">
            <div id="acc-title" class="acc-stitle"></div>
            <div id="acc-sub" class="acc-ssub"></div>
            <div id="acc-tree" class="acc-tree"></div>
        </div>
    </div>

    <!-- Absorption animation overlay (Implosion &amp; Rebirth); shown only during the Accretion sequence -->
    <canvas id="accretion-fx"></canvas>

    <!-- Accretion confirm modal — top-level so it shows over the live game when the button is pressed -->
    <div id="acc-confirm" class="acc-confirm">
        <div class="acc-confirm-box">
            <div class="acc-confirm-title">Accrete this universe?</div>
            <div id="acc-confirm-body" class="acc-confirm-body"></div>
            <div class="acc-confirm-actions">
                <button id="acc-confirm-cancel" class="acc-btn-ghost">Stay</button>
                <button id="acc-confirm-go" class="acc-btn-go">Accrete</button>
            </div>
        </div>
    </div>

    <!-- Shared upgrade description popup (positioned to the left of the hovered card) -->
    <div id="upg-pop"></div>

    <!-- Core -->
    <script src="config.js?v=110"></script>
    <script src="state.js?v=110"></script>

    <!-- Sound (engine + effects + music) -->
    <script src="sound/core.js?v=110"></script>
    <script src="sound/effects/sfx.js?v=110"></script>
    <script src="sound/music/tracks.js?v=110"></script>
    <script src="sound/sound.js?v=110"></script>

    <!-- Orbiters (one component per type) -->
    <script src="orbiters/registry.js?v=110"></script>
    <script src="orbiters/dust.js?v=110"></script>
    <script src="orbiters/asteroid.js?v=110"></script>
    <script src="orbiters/moon.js?v=110"></script>

    <!-- Upgrades -->
    <script src="upgrades/upgrades.js?v=110"></script>

    <!-- Render + simulation -->
    <script src="assets/click-effects/effects.js?v=110"></script>
    <script src="render.js?v=110"></script>
    <script src="stars.js?v=110"></script>
    <script src="comet/comet.js?v=110"></script>
    <script src="simulation.js?v=110"></script>

    <!-- UI -->
    <script src="ui/panels.js?v=110"></script>
    <script src="ui/observatory.js?v=110"></script>
    <script src="ui/hud.js?v=110"></script>
    <script src="ui/cosmo.js?v=110"></script>
    <script src="ui/accretion.js?v=110"></script>

    <!-- App -->
    <script src="settings.js?v=110"></script>
    <script src="debug.js?v=110"></script>
    <script src="main.js?v=110"></script>
</body>
</html>
