<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacuna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="logo">LACUNA</div>
            <div id="header-center">
                <div id="dust-display"><span id="dust-icon">✦</span> <span id="dust-amount">0</span>
                    <span id="remnant-display" style="display:none"><span id="remnant-icon">✸</span> <span id="remnant-amount">0</span></span>
                </div>
                <div id="dust-rate">0 / s</div>
            </div>
            <div id="header-right">
                <button id="reset-btn" title="Reset save">RESET</button>
            </div>
        </header>
        <main id="main">
            <section id="sky-section">
                <canvas id="sky"></canvas>
                <div id="hint">tap a planet to harvest it early · catch comets for a windfall</div>
            </section>
            <aside id="panel">
                <div class="panel-title">OBSERVATORY</div>
                <div id="stats-list"></div>
                <div class="panel-title" style="margin-top:22px">UPGRADES</div>
                <div id="upgrades-list"></div>
            </aside>
        </main>
    </div>
    <div id="supernova-overlay">
        <div id="supernova-card">
            <div id="sn-title">SUPERNOVA</div>
            <div id="sn-text">Your star has bloomed into light itself.<br>
            Everything it made now drifts outward, seeding new worlds.<br><br>
            The lacuna remains, if you wish to stay.</div>
            <button id="sn-close">KEEP ORBITING</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
