<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacuna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="logo">LACUNA</div>
            <div id="header-right">
                <button id="reset-btn">RESET</button>
            </div>
        </header>
        <main id="main">
            <!-- Left column: currency + observatory -->
            <aside id="left-col">
                <div class="col-label">STARDUST</div>
                <div id="dust-display">
                    <span id="dust-icon">✦</span> <span id="dust-amount">0</span>
                </div>
                <div id="dust-rate">0 / s</div>
                <div id="remnant-display" style="display:none">
                    <div class="col-label" style="margin-top:20px">REMNANTS</div>
                    <div id="remnant-big"><span id="remnant-icon">✸</span> <span id="remnant-amount">0</span></div>
                </div>
                <div class="col-label" style="margin-top:24px">OBSERVATORY</div>
                <div id="stats-list"></div>
            </aside>

            <!-- Center: sky canvas -->
            <section id="sky-section">
                <canvas id="sky"></canvas>
                <div id="hint">tap within the orbit · catch comets for a windfall</div>
            </section>

            <!-- Right column: upgrades -->
            <aside id="right-col">
                <div class="col-label">UPGRADES</div>
                <div id="upgrades-list"></div>
            </aside>
        </main>
    </div>

    <div id="supernova-overlay">
        <div id="supernova-card">
            <div id="sn-title">SUPERNOVA</div>
            <div id="sn-text">Your star has bloomed into light itself.<br>
            Everything it made now drifts outward, seeding new worlds.<br><br>
            The lacuna remains, if you wish to stay.</div>
            <button id="sn-close">KEEP ORBITING</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
