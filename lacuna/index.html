<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Around the Cosmos</title>
    <link rel="stylesheet" href="style.css?v=52">
</head>
<body>
    <div id="app">
        <div id="dust-hud">
            <div id="dust-display"><span id="dust-icon">✦</span> <span id="dust-amount">0</span></div>
        </div>
        <header id="header">
            <div id="logo">AROUND THE COSMOS</div>
            <div id="header-right">
                <button id="mute-btn">&#9834;</button>
                <div id="settings-wrap">
                    <button id="settings-btn">&#9881;</button>
                    <div id="settings-panel">
                        <div class="settings-label">SOUND</div>
                        <div class="settings-row">
                            <span class="settings-name">Music</span>
                            <input type="range" id="vol-music" min="0" max="100" value="100">
                            <span class="vol-val" id="vol-music-val">100%</span>
                        </div>
                        <div class="settings-row">
                            <span class="settings-name">Effects</span>
                            <input type="range" id="vol-sfx" min="0" max="100" value="100">
                            <span class="vol-val" id="vol-sfx-val">100%</span>
                        </div>
                        <div class="settings-label" style="margin-top:12px">MUSIC TRACK</div>
                        <div id="track-row">
                            <button class="track-btn active" data-track="0">Celestial</button>
                            <button class="track-btn" data-track="1">Drift</button>
                            <button class="track-btn" data-track="2">Wane</button>
                        </div>
                    </div>
                </div>
                <button id="reset-btn">RESET</button>
            </div>
        </header>
        <main id="main">
            <!-- Left column (reserved) -->
            <aside id="left-col"></aside>

            <!-- Center: sky canvas -->
            <section id="sky-section">
                <canvas id="sky"></canvas>
                <div id="cosmo-tip"></div>
                <div id="cosmo-card"></div>
            </section>

            <!-- Right column: upgrades -->
            <aside id="right-col">
                <div id="upg-controls">
                    <label id="show-completed-wrap">
                        <input type="checkbox" id="show-completed"> Hide completed
                    </label>
                </div>
                <div id="upgrades-list"></div>
            </aside>
        </main>
    </div>

    <!-- Draggable observatory panel — default top-left -->
    <div id="observatory">
        <div id="stats-list"></div>
    </div>

    <!-- Shared upgrade description popup (positioned to the left of the hovered card) -->
    <div id="upg-pop"></div>

    <!-- Core -->
    <script src="config.js?v=52"></script>
    <script src="state.js?v=52"></script>

    <!-- Sound (engine + effects + music) -->
    <script src="sound/core.js?v=52"></script>
    <script src="sound/effects/sfx.js?v=52"></script>
    <script src="sound/music/tracks.js?v=52"></script>
    <script src="sound/sound.js?v=52"></script>

    <!-- Orbiters (one component per type) -->
    <script src="orbiters/registry.js?v=52"></script>
    <script src="orbiters/dust.js?v=52"></script>
    <script src="orbiters/asteroid.js?v=52"></script>

    <!-- Upgrades -->
    <script src="upgrades/upgrades.js?v=52"></script>

    <!-- Render + simulation -->
    <script src="render.js?v=52"></script>
    <script src="comet/comet.js?v=52"></script>
    <script src="logic.js?v=52"></script>

    <!-- UI -->
    <script src="ui/panels.js?v=52"></script>
    <script src="ui/observatory.js?v=52"></script>
    <script src="ui/hud.js?v=52"></script>
    <script src="ui/cosmo.js?v=52"></script>

    <!-- App -->
    <script src="settings.js?v=52"></script>
    <script src="debug.js?v=52"></script>
    <script src="game.js?v=52"></script>
</body>
</html>
